<!doctype html>
<html lang="en">

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Expense Tracker Form</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet">
  </head>

  <body class="bg-light">

    <div class="container my-5">

      <div class="row justify-content-center">

        <div class="col-md-7 col-lg-6">

          <div class="card shadow">

            <div class="card-header bg-primary text-white text-center">
              <h3 class="mb-0">Expense Tracker Form</h3>
            </div>

            <div class="card-body">

              <form>

                <!-- Expense Title -->
                <div class="mb-3">
                  <label for="title" class="form-label">Expense Title</label>
                  <input type="text" class="form-control" id="title"
                    name="title" [(ngModel)]="expense.title"
                    placeholder="Enter expense title">
                </div>

                <!-- Expense Category -->
                <div class="mb-3">
                  <label for="category" class="form-label">Expense
                    Category</label>
                  <select class="form-select" id="category" name="category"
                    [(ngModel)]="expense.category">
                    <option selected disabled>Select Category</option>
                    <option>Food & Dining</option>
                    <option>Transport</option>
                    <option>Shopping</option>
                    <option>Grocery</option>
                    <option>Utility Bills</option>
                    <option>Education</option>
                    <option>Entertainment</option>
                    <option>Healthcare</option>
                    <option>Travel</option>
                    <option>Rent</option>
                    <option>Office Expense</option>
                    <option>Other</option>
                  </select>
                </div>

                <!-- Amount -->
                <div class="mb-3">
                  <label for="amount" class="form-label">Amount</label>
                  <input type="number" class="form-control" id="amount"
                    name="amount" [(ngModel)]="expense.amount"
                    placeholder="Enter amount">
                </div>

                <!-- Expense Date -->
                <div class="mb-3">
                  <label for="date" class="form-label">Expense Date</label>
                  <input type="date" class="form-control" id="date" name="date"
                    [(ngModel)]="expense.date">
                </div>

                <!-- Payment Method -->
                <div class="mb-3">
                  <label class="form-label d-block">Payment Method</label>

                  <div class="form-check">
                    <input class="form-check-input" type="radio" value="cash"
                      name="paymentMethod" [(ngModel)]="expense.paymentMethod"
                      id="cash">
                    <label class="form-check-label" for="cash">
                      Cash
                    </label>
                  </div>

                  <div class="form-check">
                    <input class="form-check-input" type="radio" value="card"
                      name="paymentMethod" [(ngModel)]="expense.paymentMethod"
                      id="Card">
                    <label class="form-check-label" for="Card">
                      Card
                    </label>
                  </div>

                  <!-- Buttons -->
                  <div class="d-grid gap-2 mt-4">
                    <button type="button" class="btn btn-primary"
                      (click)="addExp()">
                      Add Expense
                    </button>

                    <button type="button" class="btn btn-outline-secondary"
                      (click)="clear()">Reset</button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div>

      <p>Total Expenses: {{ expenses.length }}</p>
      <table class="table table-hover">
        <thead>
          <tr>
            <th scope="col">#</th>
            <th scope="col">Title</th>
            <th scope="col">Category</th>
            <th scope="col">Amount</th>
            <th scope="col">Date</th>
            <th scope="col">Payment Method</th>
            <th scope="col">Action</th>
          </tr>
        </thead>
        <tbody>
          @for (item of expenses; track $index) {
          <tr>
            <td>{{ $index + 1 }}</td>
            <td>{{ item.title }}</td>
            <td>{{ item.category }}</td>
            <td>{{ item.amount }}</td>
            <td>{{ item.date }}</td>
            <td>{{ item.paymentMethod }}</td>
            <td>
              <button (click)="deleteExpense($index)"
                class="btn btn-danger btn-sm">Delete</button>
            </td>
          </tr>
          }
        </tbody>
      </table>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  </body>
</html>
