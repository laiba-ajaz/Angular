<div class="container mt-5">
  <div class="row text-center">
    <div class="col-12">
      <h1 class="display-4 fw-bold text-primary">Global Statistics Explorer</h1>
      <p class="lead text-muted">Real-time data and metrics for countries worldwide.</p>
      <hr class="w-25 mx-auto my-4">
    </div>
  </div>

  <div class="row justify-content-center">
    <div class="col-md-8 text-center p-4 bg-light rounded shadow-sm">
      <h4 class="mb-3">Live Country Data Dashboard</h4>
      <p>Explore comprehensive details including population, currency, and linguistic distributions.</p>
    </div>
  </div>

  <div class="row justify-content-center mt-4">
    <div class="col-md-6" *ngIf="country">
       </div>
  </div>
</div>
